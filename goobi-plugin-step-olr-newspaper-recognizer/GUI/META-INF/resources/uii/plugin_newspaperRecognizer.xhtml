<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
	xmlns:c="http://java.sun.com/jsp/jstl/core" 
	xmlns:h="http://xmlns.jcp.org/jsf/html" 
	xmlns:f="http://xmlns.jcp.org/jsf/core" 
	xmlns:o="http://omnifaces.org/ui" 
	xmlns:of="http://omnifaces.org/functions" 
	template="/uii/template/template.html" 
	xmlns:x="http://myfaces.apache.org/tomahawk" 
	xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <ui:param name="myPageTitle" value="#{msgs.plugin}: #{msgs[('plugin_').concat(AktuelleSchritteForm.myPlugin.title)]}" />

	<ui:define name="breadcrumb">
        <intranda:breadcrumb label="#{msgs.startseite}" action="index" navId="a0" />
        
        <c:if test="#{LoginForm.hasRole('Workflow_Processes') and NavigationForm.uiStatus.pluginSimulation == true}">
			<intranda:breadcrumb id="processAll" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.aktuelleProzesse:msgs.prozessvorlagen}" action="process_all" navId="a1" />
			<intranda:breadcrumb id="processEdit" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.prozessDetails:msgs.process_templateDetails}" action="process_edit" />
		</c:if>
        
        <c:if test="#{NavigationForm.uiStatus.pluginSimulation != true}">
		    <intranda:breadcrumb label="#{msgs.aktuelleSchritte}" action="#{AktuelleSchritteForm.paginator.returnToPreviousPage}" />
    	   	<intranda:breadcrumb label="#{AktuelleSchritteForm.mySchritt.prozess.titel}" action="#{AktuelleSchritteForm.myPlugin.cancel}" />
		</c:if>
        
        <intranda:breadcrumb label="#{myPageTitle}" noSeparator="#{true}" />
    </ui:define>

    <ui:define name="info">
    </ui:define>

    <ui:define name="content">
		<style>
			.other-images {
				width: 100%;
				max-width: 100%;
				overflow-y: auto;				
			}
			
			.thumbnail-row .form-control {
				margin-bottom: 5px;
			}
			.thumbnail-image {
				position: relative;
				padding: 0;
			}
			.thumbnail-image .goobi-thumbnail  {
				margin: 0;
			}
			.thumbnail-image .col-xs-12.text-right {
				position: absolute;
				bottom: 4px;
				left: 0;
				width: 108%;
			}
			.other-images canvas {
				max-width: 175px !important;
			}
			.check-week {
				margin-right: 20px;
			}
			.checkbox-week {
				margin-right: 5px !important;
			}
		</style>
        
            <div class="box box-color lightgrey box-bordered">
                <div class="box-title">
                    <h3>
                        <i class="fa fa-puzzle-piece" />
                        <h:outputText id="id9a" value="#{myPageTitle}" />
                    </h3>
                    <div class="actions">
                        <h:form>
                        <h:commandLink id="id10" action="#{NavigationForm.Reload}" styleClass="btn btn-mini" style="color:white;">
                            <i class="fa fa-refresh" />
                        </h:commandLink>
                        </h:form>
                    </div>
                </div>

                <div class="box-content">
                
	               	<!-- Formular für Wochentage -->
		            <div class="row">
	                	<h:form>
		                    <div class="col-sm-12">
		                    	<!-- Wochentage als Checkboxen -->
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.monday}"/>Montag</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.tuesday}"/>Dienstag</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.wednesday}"/>Mittwoch</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.thursday}"/>Donnerstag</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.friday}"/>Freitag</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.saturday}"/>Samstag</label>
			    				<label class="check-week"><h:selectBooleanCheckbox class="checkbox-week" value="#{AktuelleSchritteForm.myPlugin.sunday}"/>Sonntag</label>
		                    	<!-- // Wochentage als Checkboxen -->
			    				
			    				<!-- Speicher-Button -->
			    				<h:commandLink styleClass="btn btn-primary pull-right" action="#{AktuelleSchritteForm.myPlugin.saveMetsFile}">Speichern</h:commandLink>
			    				<!-- // Speicher-Button -->
		    				</div>
	    				</h:form>
    				</div>
    				<hr />
    				<!-- // Formular für Wochentage -->
    				
    				
    				<!-- Bereich für Ausgaben -->
					<h:panelGroup layout="block" styleClass="col-sm-12">
                        <div class="row margin-top-most margin-bottom-most">
							
							<!-- Auflistung aller Ausgaben -->
                            <ui:repeat var="page" value="#{AktuelleSchritteForm.myPlugin.pages}" varStatus="status">
                            	<ui:fragment rendered="#{page.issue}">
	                            	<h:form>
		                            	<div class="row thumbnail-row">
												<div class="col-sm-4">
													
													<div class="col-xs-6 thumbnail-image">

														<!-- Bild der Ausgabe -->
														<div class="goobi-thumbnail font-light">
															<div class="goobi-thumbnail-image">
																<div class="thumb">
																	<canvas class="thumb-canvas" data-image_small="#{page.image.thumbnailUrl}" 
																		id="thumbnail-#{status.index}" data-image_large="#{page.image.largeThumbnailUrl}" 
																		title="#{page.image.tooltip}">
																	</canvas>
																</div>
															</div>
														</div>
														<!-- // Bild der Ausgabe -->

														<!-- Button, um diese Ausgabe in vorherige Ausgabe einzugliedern -->
														<div class="col-xs-12 text-right">
															<h:commandLink
																action="#{AktuelleSchritteForm.myPlugin.noIssue(status.index)}"
																styleClass="btn btn-default fa fa-trash"
																style="margin-right: 10px; margin-bottom: 5px;">
																
															</h:commandLink>
														</div>
														<!-- // Button, um diese Ausgabe in vorherige Ausgabe einzugliedern -->
														
													</div>
		
													<!-- Datum der Ausgabe -->
													<div class="col-xs-4">
														<h:inputText type="text" value="#{page.dateStr}" pt:placeholder="Datum" styleClass="form-control" />
													</div>

													<!-- Button für Datumsgenerierung -->
													<div class="col-xs-2">
														<h:commandLink action="#{AktuelleSchritteForm.myPlugin.generateDates(status.index)}" 
															styleClass="btn btn-default fa fa-play">
															<f:ajax render="@form" execute="@form" />
														</h:commandLink>
													</div>
													
													<!-- Nummer der Ausgabe -->
													<div class="col-xs-4">
														<h:inputText type="text" value="#{page.number}" pt:placeholder="Ausgabe" styleClass="form-control" />
													</div>
													<!-- Button zum Anzeigen oder Ausblenden der zugehörigen Seiten -->
													<div class="col-xs-2">
														<h:commandLink styleClass="btn btn-default fa fa-eye" action="#{page.toggleShowOtherImages}">
															<f:ajax render="@form" />
														</h:commandLink>
													</div>
													
													<!-- Details über zugehörige Seiten -->
													<div class="col-xs-4">
														<h:outputText value="Zugehörige Seiten: #{page.otherPages.size()}" />
													</div>
													<div class="col-xs-2"></div>
													
													
												</div>
												
												<!-- Auflistung aller zugehörigen Seiten der Ausgabe -->
												<h:panelGroup layout="block" styleClass="col-sm-8" rendered="#{page.showOtherImages}">
				                                	<div class="other-images">
					                                	<ui:repeat var="otherPage" value="#{page.otherPages}" varStatus="statusOther">
					                                		<h:commandLink action="#{AktuelleSchritteForm.myPlugin.isIssue(status.index, statusOther.index)}">
						                                		<div class="goobi-thumbnail font-light">
								                                    <div class="goobi-thumbnail-image">
								                                        <div class="thumb">
							                                                <canvas class="thumb-canvas" data-image_small="#{otherPage.image.thumbnailUrl}" data-image_large="#{otherPage.image.largeThumbnailUrl}" title="#{otherPage.image.tooltip}" id="thumbnail-#{status.index}"></canvas>
								                                        </div>
								                                    </div>
								                                </div>
								                                <f:ajax render="@form"/>
							                                </h:commandLink>
					                                	</ui:repeat>
				                                	</div>
			                                	</h:panelGroup>
			                                	<!-- // Auflistung aller zugehörigen Seiten der Ausgabe -->
			                                	
		                                </div>
		                                <hr />
		                            </h:form>
                                </ui:fragment>
                            </ui:repeat>
                            <!-- // Auflistung aller Ausgaben -->
                            
                        </div>
                    </h:panelGroup>
                    <!-- // Bereich für Ausgaben -->
                    
                </div>
           </div>
      
       <script>
       window.onload = function() {
           loadImages();
       }
       
      function loadThumbnails() {
          console.log("loading thumbnails");
//          var height = parseInt('#{Metadaten.thumbnailSize}');
           var height = parseInt('#{NavigationForm.workflowPlugin.thumbnailSize}');
           if (height) {
//                $('.goobi-thumbnail-image').css('height', (height + 25) + 'px');
               $('.goobi-thumbnail-image .thumb').css('max-height', height + 'px');
               $('.goobi-thumbnail-image .thumb canvas').css('max-height', height + 'px');
               $('.goobi-thumbnail-image').css('max-width', (height) + 'px');
           }
       }
   $( document ).ready(function() {
        loadThumbnails();
   });

   jsf.ajax.addOnEvent(function(data) {
       var ajaxstatus = data.status; // Can be "begin", "complete" and "success"
         
         switch (ajaxstatus) {
             case "success": // This is called when ajax response is successfully processed.
                 loadImages();
                 loadThumbnails();
                 break;
         }
       
   });
       </script>
    </ui:define>

</ui:composition>
