<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
	xmlns:c="http://java.sun.com/jsp/jstl/core" 
	xmlns:h="http://xmlns.jcp.org/jsf/html" 
	xmlns:f="http://xmlns.jcp.org/jsf/core" 
	xmlns:o="http://omnifaces.org/ui" 
	xmlns:of="http://omnifaces.org/functions" 
	template="/uii/template/template.html" 
	xmlns:x="http://myfaces.apache.org/tomahawk" 
	xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <ui:param name="myPageTitle" value="#{msgs.plugin}: #{msgs[('plugin_').concat(AktuelleSchritteForm.myPlugin.title)]}" />

	<ui:define name="breadcrumb">
        <intranda:breadcrumb label="#{msgs.startseite}" action="index" navId="a0" />
        
        <c:if test="#{LoginForm.hasRole('Workflow_Processes') and NavigationForm.uiStatus.pluginSimulation == true}">
			<intranda:breadcrumb id="processAll" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.aktuelleProzesse:msgs.prozessvorlagen}" action="process_all" navId="a1" />
			<intranda:breadcrumb id="processEdit" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.prozessDetails:msgs.process_templateDetails}" action="process_edit" />
		</c:if>
        
        <c:if test="#{NavigationForm.uiStatus.pluginSimulation != true}">
		    <intranda:breadcrumb label="#{msgs.aktuelleSchritte}" action="#{AktuelleSchritteForm.paginator.returnToPreviousPage}" />
    	   	<intranda:breadcrumb label="#{AktuelleSchritteForm.mySchritt.prozess.titel}" action="#{AktuelleSchritteForm.myPlugin.cancel}" />
		</c:if>
        
        <intranda:breadcrumb label="#{myPageTitle}" noSeparator="#{true}" />
    </ui:define>

    <ui:define name="info">
    </ui:define>

    <ui:define name="content">
        <h:outputStylesheet library="css" name="newspapergrid.css?v=${buildNumber}" />
        <h:form id="newspaper_form">
			<h:inputText id="my_plugin_data" value="#{AktuelleSchritteForm.myPlugin.jsonData}" style="display:none"></h:inputText>
            <h:commandLink id="delete_and_start_over_button" action="#{AktuelleSchritteForm.myPlugin.deleteManualDataAndStartAutoAnalysis}">
            </h:commandLink>
			<h:commandLink id="save_mets_button" action="#{AktuelleSchritteForm.myPlugin.saveMetsFile}">
				<f:ajax execute="@form" />
			</h:commandLink>
			<h:commandLink id="save_data_button">
				<f:ajax execute="@form" />
			</h:commandLink>
			<h:commandLink id="finish_button" action="#{AktuelleSchritteForm.myPlugin.finish}"></h:commandLink>
		</h:form>
        <newspaper_correction></newspaper_correction>
      
      <script src="template/js/riot+compiler.min.js" type="text/javascript"></script>
      <script src="template/js/xdate.js" type="text/javascript"></script>
      <script src="newspaper_correction.tag?v=${buildNumber}" type="riot/tag"></script>
      <script src="thumbcanvas_fixed.tag?v=${buildNumber}" type="riot/tag"></script>
       <script>
       window.onload = function() {
           window.noLoadImages = true;
           var opts = {
           		data_el: document.getElementById('newspaper_form:my_plugin_data'),
           		saveButton: document.getElementById('newspaper_form:save_mets_button'),
           		saveDataButton: document.getElementById('newspaper_form:save_data_button'),
           		finishButton: document.getElementById('newspaper_form:finish_button'),
           		restartAnalysisButton: document.getElementById('newspaper_form:delete_and_start_over_button'),
           		lang: '#{SpracheForm.locale.language}',
           		thumbHeight: 400,
           		loadallimages: #{AktuelleSchritteForm.myPlugin.loadAllImages}
           };
           console.log(opts);
           riot.mount("newspaper_correction", opts);
       }
